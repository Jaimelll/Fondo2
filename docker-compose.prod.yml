# Compose de PRODUCCION (servidor). Usa el build standalone del Dockerfile
# en lugar del dev server. Uso:
#   docker compose -f docker-compose.prod.yml up -d --build
# La BD usa el mismo volumen fondo2_pgdata que el compose de desarrollo,
# asi que los datos se conservan al cambiar de uno a otro.

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: fondo2
      POSTGRES_PASSWORD: fondo2
      POSTGRES_DB: fondo2
    ports:
      - "5434:5432"
    volumes:
      - fondo2_pgdata:/var/lib/postgresql/data
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
      # sin "target": usa el stage final "runner" (next build + node server.js)
    ports:
      - "8082:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fondo2:fondo2@db:5432/fondo2
    volumes:
      # persiste los PDFs subidos fuera del contenedor
      - ./storage/documentos:/app/storage/documentos
    depends_on:
      - db
    restart: always

volumes:
  fondo2_pgdata:
