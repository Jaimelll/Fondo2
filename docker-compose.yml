

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: fondo2
      POSTGRES_PASSWORD: fondo2
      POSTGRES_DB: fondo2
    ports:
      - "5434:5432"
    volumes:
      - fondo2_pgdata:/var/lib/postgresql/data
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "8082:3000"
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - DATABASE_URL=postgresql://fondo2:fondo2@db:5432/fondo2
    depends_on:
      - db
    restart: always

volumes:
  fondo2_pgdata:
